name: pr_checks_tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pr_checks_tests:
    name: pr_checks_tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install package and test dependencies
        run: python -m pip install --upgrade pip '.[dev]'

      - name: Run package tests
        run: pytest tests/package -q --maxfail=1
