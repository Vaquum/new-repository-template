name: pr_checks_slice_sweep

# Re-run the slice gate for every open PR targeting main on a fixed
# cadence and, when the latest `pr_checks_slice` check-run disagrees
# with the fresh verdict, publish the main-computed verdict as a new
# check-run on the head commit.
#
# Why: `pr_checks_slice` runs on pull_request activity and caches its
# verdict; `pr_checks_slice_on_issue` reposts it when a linked issue
# changes. If that on-issue rerun crashes before posting, a stale green
# verdict persists until the PR's next own event. This sweep bounds the
# staleness window: a stale verdict now survives at most one sweep
# interval. The sweep is a backstop, not a single point of failure --
# the pull_request-event gate still runs on every PR update.
#
# The gate here executes from a checkout of main, never from a PR's
# merge ref, so a sweep verdict cannot be self-attested by the PR it
# judges. For the same reason the sweep never reruns the pull_request
# workflow: that would re-execute the gate from the judged PR's merge
# ref and publish whatever it computes — the exact channel this
# main-only contract closes. The on-issue rerun owns UI healing; the
# sweep owns authoritative delivery.
#
# GitHub branch protection treats the MOST RECENT check-run per name
# per commit SHA as authoritative, so a failure posted here
# immediately blocks merge until the issue state or the PR is fixed.
#
# The fail-closed truncation and file-enumeration contracts mirror
# pr_checks_slice_on_issue.yml; first proven downstream in Vaquum/Limen
# (its S691 and S724 series).

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

concurrency:
  # No cancel-in-progress: killing a sweep mid-posting would leave some
  # PRs reposted and others stale for a full extra interval. A queued
  # run simply follows.
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sweep_slice_gate_for_open_prs:
    name: pr_checks_slice_sweep
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: read
      pull-requests: read
      checks: write  # required to POST the main-computed check-runs

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          # Pin to main so a workflow_dispatch from another ref still
          # executes the gate from main's tree, keeping the
          # main-only execution contract mechanical.
          ref: main
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: pip install --require-hashes -r requirements/ci/gate-tools.txt

      - name: List open PRs targeting main
        id: open_prs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          gh pr list --repo "$REPO" --base main --state open --limit 1000 \
            --json number,headRefOid > open_prs.json
          echo "open PRs targeting main:"
          jq -c '.[]' open_prs.json
          COUNT=$(jq 'length' open_prs.json)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Re-run slice gate per open PR and post check-run
        if: steps.open_prs.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"

          jq -c '.[]' open_prs.json | while IFS= read -r pr; do
            PR_NUM=$(echo "$pr" | jq -r .number)
            HEAD_SHA=$(echo "$pr" | jq -r .headRefOid)
            echo "::group::re-running slice gate for PR #$PR_NUM @ $HEAD_SHA"

            # Title + body + canonical file count; files come from the
            # paginated REST endpoint, not `gh pr view --json files`
            # (which caps at 100 and would silently under-enforce
            # rules 7 and 8 on large PRs).
            gh pr view "$PR_NUM" --repo "$REPO" \
              --json title,body,changedFiles > pr_view.json
            jq -r '.title' pr_view.json > pr_title.txt
            jq -r '.body // ""' pr_view.json > pr_body.txt
            EXPECTED_FILES=$(jq -r '.changedFiles' pr_view.json)

            gh api "repos/$REPO/pulls/$PR_NUM/files" \
              --paginate --jq '.[].filename' > pr_files.txt
            ACTUAL_FILES=$(wc -l < pr_files.txt | tr -d ' ')

            if [ "$ACTUAL_FILES" -ne "$EXPECTED_FILES" ]; then
              # Post a FAILURE check-run immediately rather than
              # silently proceeding with a truncated file set -- the
              # same fail-closed contract as the on-issue rerun.
              gh api "repos/$REPO/check-runs" \
                --method POST \
                -f "name=pr_checks_slice" \
                -f "head_sha=$HEAD_SHA" \
                -f "status=completed" \
                -f "conclusion=failure" \
                -f "output[title]=Slice gate sweep ABORTED: file enumeration incomplete" \
                -f "output[summary]=pr_checks_slice_sweep got $ACTUAL_FILES files from the paginated API but the PR object reports $EXPECTED_FILES. The sweep refuses to run a scope check on a truncated set." \
                -f "details_url=https://github.com/$REPO/actions/runs/${{ github.run_id }}"
              echo "::endgroup::"
              continue
            fi

            # Run the slice gate; capture output and exit code.
            PR_TITLE=$(cat pr_title.txt)
            set +e
            GATE_OUT=$(python governance/slice_gate.py \
              --pr-title "$PR_TITLE" \
              --pr-body-file pr_body.txt \
              --pr-files-file pr_files.txt \
              --template .github/ISSUE_TEMPLATE/slice.yml \
              --repo "$REPO" 2>&1)
            GATE_EXIT=$?
            set -e
            echo "$GATE_OUT"

            if [ "$GATE_EXIT" -eq 0 ]; then
              CONCLUSION="success"
              TITLE_OUT="Slice gate re-passed by scheduled sweep"
            else
              CONCLUSION="failure"
              TITLE_OUT="Slice gate FAILED in scheduled sweep"
            fi

            # Publish only on disagreement with the LATEST check-run of
            # the name on the head SHA -- what branch protection reads;
            # a stale fallback POST can outrank the canonical run, so
            # this comparison is what bounds staleness. The sweep never
            # reruns the pull_request workflow: that would re-execute
            # the gate from the judged PR's merge ref and let the PR
            # self-attest, the exact channel the main-only execution
            # contract closes.
            LATEST=$(gh api \
              "repos/$REPO/commits/$HEAD_SHA/check-runs?check_name=pr_checks_slice&per_page=100" --paginate \
              --jq '[.check_runs[] | select(.status == "completed")] | sort_by(.completed_at) | last | .conclusion // empty')
            if [ "$LATEST" = "$CONCLUSION" ]; then
              echo "latest pr_checks_slice check-run already $CONCLUSION; nothing to deliver"
              echo "::endgroup::"
              continue
            fi

            # Keep output.summary under the 65 KB API limit. Truncation
            # uses a parameter expansion, not a pipe: with pipefail, a
            # `printf | head -c` pipeline dies by SIGPIPE exactly when
            # output is long enough to truncate, aborting the sweep.
            SUMMARY=$(printf 'Posted by pr_checks_slice_sweep run %s.\n\n```\n%s\n```\n' \
              "${{ github.run_id }}" "$GATE_OUT")
            SUMMARY=${SUMMARY:0:60000}

            # Same check-run name as the pull_request workflow, so
            # branch protection sees this as the current status of
            # `pr_checks_slice` on that head SHA.
            gh api "repos/$REPO/check-runs" \
              --method POST \
              -f "name=pr_checks_slice" \
              -f "head_sha=$HEAD_SHA" \
              -f "status=completed" \
              -f "conclusion=$CONCLUSION" \
              -f "output[title]=$TITLE_OUT" \
              -f "output[summary]=$SUMMARY" \
              -f "details_url=https://github.com/$REPO/actions/runs/${{ github.run_id }}"
            echo "::endgroup::"
          done
