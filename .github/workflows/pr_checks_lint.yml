name: pr_checks_lint

on:
  pull_request:
    branches: [main]
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  pr_checks_lint:
    name: pr_checks_lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38  # v6.5.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install documentation toolchain
        run: npm --prefix docs-site ci

      - name: Install documentation browser
        run: npm --prefix docs-site exec -- playwright install --with-deps chromium

      - name: Audit documentation dependencies
        run: npm --prefix docs-site run security:audit

      - name: Check documentation site
        run: npm --prefix docs-site run check

      - name: Set up lint venv
        run: python -m venv .venv-lint

      - name: Install gate toolchain and project
        run: |
          uv pip install --python .venv-lint/bin/python --require-hashes -r requirements/ci/dev-env.txt
          uv pip install --python .venv-lint/bin/python --require-hashes -r requirements/ci/build-tools.txt
          uv pip install --python .venv-lint/bin/python --no-build-isolation --no-deps -e .

      - name: Resolve package root
        id: package
        run: |
          set -euo pipefail
          package_root="$(python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('.github/typing_budget.json').read_text())
          root = data.get('package_root')
          if not isinstance(root, str) or not root:
              raise SystemExit('typing_budget.json must set package_root')
          print(root)
          PY
          )"
          if [ ! -d "$package_root" ]; then
            echo "::error::package root '$package_root' does not exist"
            exit 1
          fi
          echo "package_root=$package_root" >> "$GITHUB_OUTPUT"

      - name: Run ruff lint
        run: .venv-lint/bin/python -m ruff check "${{ steps.package.outputs.package_root }}" governance tests

      - name: Module line-count budget gate
        run: .venv-lint/bin/python governance/check_module_budgets.py

      - name: Module docstring gate
        run: .venv-lint/bin/python governance/check_module_docstrings.py

      - name: Docstring conventions gate
        run: .venv-lint/bin/python governance/check_docstrings.py

      - name: File size balance gate
        run: .venv-lint/bin/python governance/check_file_size_balance.py

      - name: Test/code SLOC ratio gate
        run: .venv-lint/bin/python governance/check_test_code_ratio.py

      - name: Dead-code (vulture)
        run: .venv-lint/bin/python -m vulture "${{ steps.package.outputs.package_root }}/" --min-confidence 80

      - name: No-swallowed-violations gate
        run: .venv-lint/bin/python governance/check_no_swallowed_violations.py

      - name: Test fallback gate
        run: .venv-lint/bin/python governance/check_test_fallbacks.py

      - name: Dependency vulnerability gate
        run: .venv-lint/bin/python governance/check_dependency_vulnerabilities.py

      - name: Coverage floor gate
        run: |
          .venv-lint/bin/python -m coverage run --branch --source="${{ steps.package.outputs.package_root }}" \
            -m pytest tests/ governance/tests/ -q
          .venv-lint/bin/python -m coverage json -o coverage.json
          .venv-lint/bin/python governance/check_coverage_floor.py

      - name: Diff coverage gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          AUTH="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')"
          git -c "http.https://github.com/.extraheader=$AUTH" fetch origin "$BASE_REF"
          .venv-lint/bin/python governance/check_diff_coverage.py --base-ref "origin/$BASE_REF"

      - name: Budget-raise ratchet gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          AUTH="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')"
          git -c "http.https://github.com/.extraheader=$AUTH" fetch origin "$BASE_REF" --depth=1
          .venv-lint/bin/python governance/check_budget_ratchet.py \
            --base-ref "origin/$BASE_REF" \
            --pr-number "$PR_NUMBER"

      - name: Coverage ratchet gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          AUTH="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')"
          git -c "http.https://github.com/.extraheader=$AUTH" fetch origin "$BASE_REF" --depth=1
          .venv-lint/bin/python governance/check_coverage_ratchet.py \
            --base-ref "origin/$BASE_REF" \
            --pr-number "$PR_NUMBER"
