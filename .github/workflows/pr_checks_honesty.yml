name: pr_checks_honesty

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  pr_checks_honesty:
    name: pr_checks_honesty
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'

      - name: Install package and test dependencies
        run: |
          python -m pip install --require-hashes -r requirements/ci/dev-env.txt
          python -m pip install --require-hashes -r requirements/ci/runtime-env.txt
          python -m pip install --require-hashes -r requirements/ci/build-tools.txt
          python -m pip install --no-build-isolation --no-deps -e .

      - name: Run honesty gate suite
        run: pytest governance/tests/test_repository_law.py -v --tb=short
