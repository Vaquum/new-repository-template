name: Slice
description: Plan, deliver, and close one repository slice against mechanical proof.
labels:
  - slice

body:

  - type: markdown
    attributes:
      value: |
        ## How this template works

        Every section below opens with a blockquoted **Significance** note. That note
        explains what the section is for and what content the section does and does not
        accept. **The Significance notes are part of the filed issue.** They ride
        alongside your content so anyone reading this issue — now or a year from now —
        sees both what you filled in and what the template required you to fill in.
        A slice issue without its Significance notes is not a slice issue and will be
        closed unfiled.

        Prose goals, noun-phrase objectives, philosophy of proof, taxonomy of
        guardrails: not accepted. Every section asks for a mechanical predicate —
        a command, a file path, a function signature, a commit SHA, or a CI
        workflow name — that can be evaluated against repo state at merge.

  - type: input
    id: slice_id
    attributes:
      label: Slice ID
      placeholder: "S62"
    validations:
      required: true

  - type: input
    id: slice_title
    attributes:
      label: Slice Title
      description: |
        A noun phrase that names the concrete change. "Add X to Y" and "Replace A
        with B" beat "Harden the X contract" and "Freeze the Y semantics."
      placeholder: "Add public health endpoint"
    validations:
      required: true

  - type: textarea
    id: routing
    attributes:
      label: Routing
      value: |
        > **Significance.** Routing is the minimum information needed to place this
        > slice in the dependency graph. Parent and dependencies must be existing
        > issue numbers; unlocks may be forward-looking. Prose description of the
        > relationship is not accepted — only issue references. This section is not
        > a planning document; it is a graph edge list.

        Parent issue:
        Depends on:
        -
        Unlocks:
        -
    validations:
      required: true

  - type: textarea
    id: mvc
    attributes:
      label: Minimum Viable Capability
      value: |
        > **Significance.** A slice delivers exactly one capability. The capability
        > must be expressible as a set of assertions that become mechanically true
        > at merge. This is the answer to *what changes in the system that an
        > external observer can verify by running a command?* Every line below
        > must be evaluable as a shell command, SQL query, Python expression, or
        > HTTP request that returns a definite result. One assertion per line.
        >
        > Accepted:
        > - `python -m pytest tests/package -q` returns exit code `0`.
        > - `python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])"` returns `0.1.1`.
        > - `python -m pyright --outputjson | jq '.summary.errorCount'` returns `0`.
        >
        > Rejected:
        > - *Freeze the current-truth read contract.*
        > - *Strict CQRS separation.*
        > - *Terminal proof obligations are complete.*

        Assertions (one per line, each executable as-is):
        -
        -
        -
    validations:
      required: true

  - type: textarea
    id: before_state
    attributes:
      label: Current State
      value: |
        > **Significance.** Baseline is a snapshot of repo / runtime state today,
        > not a history of how we got here. Each line below is a command and its
        > output today. A reader should be able to run these commands against
        > `main` and confirm the baseline. If a fact matters to the slice and cannot
        > be expressed as a command with output, it probably does not matter
        > mechanically and does not belong here.
        >
        > Accepted:
        > - `git show HEAD:pyproject.toml | grep -c 'requires-python = ">=3.12"'` returns `1`.
        > - `python -m pytest tests/package -q` returns exit code `0`.
        >
        > Rejected:
        > - *The system has accumulated technical debt in the read path.*
        > - *Several live paths already consume that read constant.*

        Commands with output (one per line):
        -
        -
        -
    validations:
      required: true

  - type: textarea
    id: after_state
    attributes:
      label: Target State
      value: |
        > **Significance.** Parallel to *Current State*: each line is a command and
        > the output that command will return AFTER the slice merges. These
        > commands ARE the proof obligation of the slice. Each one maps to a test
        > in the *Tests* section below. Vague targets like "the system is faster"
        > or "the contract is hardened" are rejected — state the measurable
        > predicate.
        >
        > Accepted:
        > - `pytest tests/package/test_health.py -q` returns exit code `0`.
        > - `python -m pyright --outputjson | jq '.summary.errorCount'` returns `0`.
        > - `python governance/check_module_budgets.py` returns exit code `0`.

        Commands with output on the merge commit (one per line):
        -
        -
        -
    validations:
      required: true

  - type: textarea
    id: surfaces
    attributes:
      label: Surfaces
      value: |
        > **Significance.** This is the mechanical scope contract. List every file
        > path that the PR delivering this slice will modify, add, or remove.
        > Files outside these three lists must not change. A scope-check CI step
        > compares the PR's changed-file set against this list and fails if they
        > diverge. The scope model is: "out of scope is every file not listed
        > here." Glob patterns are permitted; prose is not.

        Modified (exact paths relative to repo root, or globs):
        -

        Added:
        -

        Removed:
        -
    validations:
      required: true

  - type: textarea
    id: signature_diff
    attributes:
      label: Signature Diff
      value: |
        > **Significance.** For every surface in the list above that has a public
        > signature — a function, a class, a SQL view or table, an HTTP route, a
        > CLI entry point, a JSON schema — give the `Before` and `After` forms as
        > code blocks. These signatures are the contract future PRs cannot
        > silently regress. Prose like "rename the function" or "make it
        > fail-loud" is rejected — the only accepted content under `Before` and
        > `After` is a literal code fragment in the language of the surface.

        ### <file>::<symbol>
        Before:
        ```

        ```
        After:
        ```

        ```

        ### <file>::<symbol>
        Before:
        ```

        ```
        After:
        ```

        ```
    validations:
      required: true

  - type: textarea
    id: tests
    attributes:
      label: Tests That Prove the MVC
      value: |
        > **Significance.** Every assertion in the *Minimum Viable Capability*
        > section above has exactly one test. This section is the mapping. Each
        > row names the MVC assertion (quote or shorten it), the test file path,
        > and the test name within that file. The test must exist at merge and
        > must pass in CI. Prose like "terminal proof obligation," "claim class,"
        > or "proof freshness requirement" is rejected — the row's middle column
        > is a path that resolves to a running test, or the row is wrong.

        | MVC assertion | test file | test name |
        |---|---|---|
        |  |  |  |
        |  |  |  |
        |  |  |  |
    validations:
      required: true

  - type: textarea
    id: regression_gate
    attributes:
      label: Regression Gate
      value: |
        > **Significance.** A slice is not complete if its capability can be
        > silently removed by the next PR. Name the CI workflow and job that
        > will fail a future PR that regresses this MVC. If no such gate exists
        > today, creating it is part of this slice. The answer below is the
        > mechanical block on tomorrow's PR undoing today's work.
        >
        > Accepted:
        > - Workflow `.github/workflows/pr_checks_contract.yml`, job
        >   `contract-gate`, which runs
        >   `pytest tests/contract/test_stream_sequence.py` and fails the PR
        >   on non-zero exit.
        >
        > Rejected:
        > - *A guardrail will be added to the backfill protocol.*
        > - *Invariants documented in the slice spec.*
        > - *The proof fixture will be extended.*

        Workflow file:
        Job name:
        Specific failing command the job runs:
    validations:
      required: true

  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of Scope
      value: |
        > **Significance.** The slice PR must not touch the paths listed here.
        > A scope-check CI step compares the PR diff against this list and fails
        > if any out-of-scope path appears in the diff. This is the mechanical
        > complement to the *Surfaces* section above. "Out of scope" here is
        > not aspirational — it is a CI-enforced block.

        Paths that must not change in this slice's PR (globs permitted):
        -
        -
    validations:
      required: true

  - type: textarea
    id: risks
    attributes:
      label: Risks and Open Questions
      value: |
        > **Significance.** Short. Only risks that change the decision tree for
        > this slice belong here. A risk that is resolved by doing more
        > engineering work is engineering work, not a risk, and goes in the
        > *Target State* section instead.

        Risks:
        -

        Open questions:
        -
    validations:
      required: false

  - type: textarea
    id: done_means
    attributes:
      label: Done Means
      value: |
        > **Significance.** Done Means closes on verifiable evidence, not on a
        > self-assessed claim. Check each item only when the linked evidence
        > exists. Every checkbox in this section must be checked or marked
        > `OVERRULED: <reason>` before the delivering PR can merge (slice-gate
        > rule 10). The evidence fields below are written automatically by
        > `slice_closeout_guard` when a merged PR closes this issue; a close
        > with no merged PR and no evidence is reverted.

        - [ ] Capability complete
        - [ ] Tests complete
        - [ ] Regression gate complete
        - [ ] Required gates green
        - [ ] Required docs updated

        Merge SHA:
        Merged PR number:
        Required CI runs (workflow name : run id):
        -
        -
    validations:
      required: true

  - type: checkboxes
    id: author_checks
    attributes:
      label: Author Checks
      options:
        - label: The Significance blockquote at the top of every section above remains in this issue unchanged.
          required: true
        - label: Every MVC assertion is executable (shell command, SQL query, Python expression, or HTTP request) and has a definite expected output.
          required: true
        - label: Every MVC assertion has exactly one row in the Tests table pointing at a concrete test file and test name.
          required: true
        - label: Every Surfaces entry with a public signature has a corresponding Signature Diff entry with literal Before and After code blocks.
          required: true
        - label: The Regression Gate cites a CI workflow file path, a job name, and a specific failing command — not a promise to add one later.
          required: true
        - label: The Current State and Target State sections contain commands, not prose.
          required: true
